<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>STELLER·DEEM — An Interactive Solar System</title>
<style>
:root{
  --void:#04050a;
  --ink:#eef1fb;
  --muted:#9099ad;
  --gold:#ffb454;
  --gold-deep:#d98c3a;
  --cyan:#8fd9ff;
  --glass:rgba(13,17,32,0.55);
  --glass-strong:rgba(9,12,24,0.74);
  --border:rgba(255,255,255,0.09);
  --radius:18px;
  --font-ui: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", "Cascadia Mono", "Roboto Mono", monospace;
}
*{box-sizing:border-box;}
html,body{margin:0;height:100%;background:var(--void);overflow:hidden;font-family:var(--font-ui);color:var(--ink);-webkit-tap-highlight-color:transparent;}
button{font-family:inherit;}
:focus-visible{outline:2px solid var(--cyan);outline-offset:3px;border-radius:8px;}

#scene-canvas{position:fixed;inset:0;display:block;touch-action:none;outline:none;}

.vignette{position:fixed;inset:0;pointer-events:none;z-index:5;
  background:radial-gradient(ellipse at center, rgba(0,0,0,0) 52%, rgba(0,0,0,0.62) 100%);}

/* ---------- Boot ---------- */
.boot{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 50% 38%, #181f38 0%, var(--void) 72%);
  transition:opacity 0.9s ease, visibility 0.9s ease;}
.boot-hidden{opacity:0;visibility:hidden;pointer-events:none;}
.boot-inner{text-align:center;padding:0 24px;max-width:560px;}
.boot-title{font-size:clamp(26px,6vw,50px);font-weight:300;letter-spacing:0.32em;margin:0 0 12px;
  opacity:0;animation:fadeUp 1.8s ease forwards;animation-delay:0.5s;}
.boot-title span{color:var(--gold);}
.boot-sub{font-size:13px;color:var(--muted);letter-spacing:0.07em;margin:0 0 38px;
  opacity:0;animation:fadeUp 1.8s ease forwards;animation-delay:1.1s;}
.enter-btn{font-size:12px;letter-spacing:0.14em;text-transform:uppercase;padding:16px 34px;border-radius:999px;
  border:1px solid var(--border);background:var(--glass);color:var(--ink);backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);cursor:pointer;opacity:0;animation:fadeUp 1.8s ease forwards;animation-delay:1.9s;
  transition:background 0.3s, transform 0.3s, border-color 0.3s;}
.enter-btn:hover{background:rgba(255,180,84,0.16);border-color:rgba(255,180,84,0.55);transform:translateY(-2px);}
.boot-note{font-size:11px;color:var(--muted);opacity:0;animation:fadeUp 1.8s ease forwards;animation-delay:2.3s;
  margin-top:20px;letter-spacing:0.04em;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}

/* ---------- HUD ---------- */
.hud{position:fixed;inset:0;pointer-events:none;z-index:10;opacity:0;transition:opacity 1.1s ease;}
.hud.visible{opacity:1;}
.hud.visible *{pointer-events:auto;}
.brand{position:absolute;top:22px;left:24px;font-size:11px;letter-spacing:0.3em;color:var(--muted);}
.brand b{color:var(--ink);font-weight:400;}

.hint{position:absolute;bottom:132px;left:50%;transform:translate(-50%,8px);font-size:12px;color:var(--muted);
  background:var(--glass);border:1px solid var(--border);padding:9px 18px;border-radius:999px;
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);opacity:0;
  transition:opacity 0.6s ease, transform 0.6s ease;letter-spacing:0.02em;white-space:nowrap;}
.hint.show{opacity:1;transform:translate(-50%,0);}

.dock{position:absolute;left:50%;bottom:20px;transform:translateX(-50%);width:min(880px,93vw);
  display:flex;flex-direction:column;align-items:center;gap:10px;}
.transport{display:flex;align-items:center;gap:14px;background:var(--glass);border:1px solid var(--border);
  border-radius:999px;padding:8px 16px;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);}
.icon-btn{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:rgba(255,255,255,0.04);
  color:var(--ink);font-size:13px;display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:background 0.25s;flex:none;}
.icon-btn:hover{background:rgba(255,255,255,0.1);}
.speed-slider{width:104px;accent-color:var(--gold);}
.speed-label{font-family:var(--font-mono);font-size:11px;color:var(--muted);width:34px;text-align:left;}

.rail{position:relative;width:100%;height:56px;background:var(--glass);border:1px solid var(--border);
  border-radius:999px;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);}
.rail::before{content:'';position:absolute;left:6%;right:6%;top:50%;height:1px;
  background:linear-gradient(90deg, rgba(255,180,84,0.55), rgba(143,217,255,0.22));transform:translateY(-50%);}
.rail-node{position:absolute;top:50%;transform:translate(-50%,-50%);display:flex;flex-direction:column;
  align-items:center;gap:4px;background:none;border:none;cursor:pointer;padding:8px;}
.rail-node .dot{width:9px;height:9px;border-radius:50%;display:block;background:var(--cyan);
  box-shadow:0 0 8px currentColor;color:var(--cyan);transition:box-shadow 0.25s;}
.rail-node .label{font-size:10px;color:var(--muted);letter-spacing:0.03em;white-space:nowrap;transition:color 0.25s;}
.rail-node.active .label{color:var(--ink);}
.rail-node.active .dot{box-shadow:0 0 16px 3px currentColor;}
.rail-node:hover .label{color:var(--ink);}
.rail-node.sun-node .dot{background:var(--gold);color:var(--gold);}

/* ---------- Info panel ---------- */
.info-panel{position:absolute;top:18px;right:18px;bottom:18px;width:392px;max-width:90vw;
  background:var(--glass-strong);border:1px solid var(--border);border-radius:var(--radius);
  backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);padding:24px;display:flex;flex-direction:column;
  transform:translateX(26px);opacity:0;pointer-events:none;
  overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,0.35), 0 0 50px var(--panel-glow, rgba(0,0,0,0));
  transition:opacity 0.55s ease, transform 0.55s ease, box-shadow 0.6s ease;
  border-top:2px solid var(--panel-accent, var(--border));}
.info-panel.open{opacity:1;transform:translateX(0);pointer-events:auto;}
.info-close{position:absolute;top:16px;right:16px;width:28px;height:28px;border-radius:50%;
  border:1px solid var(--border);background:rgba(255,255,255,0.04);color:var(--muted);font-size:17px;
  cursor:pointer;line-height:1;display:flex;align-items:center;justify-content:center;}
.info-close:hover{color:var(--ink);background:rgba(255,255,255,0.1);}
.info-head{display:flex;align-items:center;gap:14px;padding-right:28px;}
.info-swatch{width:52px;height:52px;border-radius:50%;flex:none;
  box-shadow:0 0 22px 2px var(--swatch-glow, rgba(255,180,84,0.4)), inset -4px -4px 10px rgba(0,0,0,0.35);
  background:radial-gradient(circle at 35% 30%, var(--swatch-light,#fff) 0%, var(--swatch-mid,#ffb454) 45%, var(--swatch-dark,#7a4a1c) 100%);}
.info-head-text{min-width:0;}
.info-eyebrow{font-size:11px;letter-spacing:0.09em;color:var(--cyan);font-family:var(--font-mono);
  text-transform:uppercase;display:block;}
.info-title{font-size:27px;font-weight:300;letter-spacing:0.04em;margin:3px 0 0;}
.info-tagline{font-size:13px;color:var(--muted);margin:12px 0 16px;line-height:1.55;}
.hero-stats{display:flex;gap:10px;margin-bottom:16px;}
.hero-item{flex:1;text-align:center;background:rgba(255,255,255,0.035);border:1px solid var(--border);
  border-radius:12px;padding:9px 4px;}
.hero-val{display:block;font-family:var(--font-mono);font-size:13px;color:var(--ink);letter-spacing:0.01em;}
.hero-key{display:block;font-size:9px;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase;margin-top:3px;}
.info-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:12px;margin-bottom:4px;
  border-bottom:1px solid var(--border);scrollbar-width:none;flex:none;}
.info-tabs::-webkit-scrollbar{display:none;}
.info-tab{flex:none;font-size:11px;letter-spacing:0.03em;color:var(--muted);background:rgba(255,255,255,0.03);
  border:1px solid transparent;border-radius:999px;padding:7px 13px;cursor:pointer;white-space:nowrap;
  transition:all 0.25s;}
.info-tab.active{color:#1a1304;background:var(--gold);border-color:var(--gold);}
.info-content{overflow-y:auto;flex:1;font-size:13px;line-height:1.6;padding-top:14px;}
.info-content.fade-in{animation:fadeIn 0.45s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.info-p{color:var(--ink);margin:0 0 14px;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 14px;margin-bottom:6px;}
.stat{display:flex;flex-direction:column;gap:2px;}
.stat-k{font-size:9.5px;color:var(--muted);letter-spacing:0.05em;text-transform:uppercase;}
.stat-v{font-family:var(--font-mono);font-size:12.5px;color:var(--ink);}
.fact-list{margin:0;padding:0 0 0 16px;color:var(--ink);}
.fact-list li{margin-bottom:10px;}
.info-content::-webkit-scrollbar{width:6px;}
.info-content::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:4px;}

@media (max-width:760px){
  .info-panel{left:12px;right:12px;top:auto;bottom:108px;width:auto;max-height:46vh;padding:18px;}
  .rail-node .label{display:none;}
  .rail-node.active .label{display:block;position:absolute;top:-19px;font-size:9px;}
  .brand{font-size:9.5px;top:16px;left:16px;}
  .info-title{font-size:24px;}
  .hint{bottom:auto;top:74px;}
}

@media (prefers-reduced-motion: reduce){
  .boot-title,.boot-sub,.enter-btn,.boot-note{animation-duration:0.01ms !important;}
}
</style>
</head>
<body>

<canvas id="scene-canvas" aria-label="Interactive 3D Solar System"></canvas>
<div class="vignette"></div>

<div id="boot" class="boot">
  <div class="boot-inner">
    <h1 class="boot-title">STELLER<span>·</span>DEEM</h1>
    <p class="boot-sub">An interactive window into our Solar System</p>
    <button id="enter-btn" class="enter-btn" type="button">Enter the Solar System</button>
    <p class="boot-note">Best with sound on · drag to look around</p>
  </div>
</div>

<div id="hud" class="hud" aria-hidden="true">
  <div class="brand"><b>STELLER</b>·DEEM</div>

  <p id="hint" class="hint">Drag to orbit · scroll to zoom · choose a world below</p>

  <aside id="info-panel" class="info-panel" aria-live="polite">
    <button id="info-close" class="info-close" type="button" aria-label="Return to overview">×</button>
    <div class="info-head">
      <div id="info-swatch" class="info-swatch"></div>
      <div class="info-head-text">
        <span id="info-eyebrow" class="info-eyebrow"></span>
        <h2 id="info-title" class="info-title"></h2>
      </div>
    </div>
    <p id="info-tagline" class="info-tagline"></p>
    <div id="info-hero" class="hero-stats"></div>
    <nav id="info-tabs" class="info-tabs" role="tablist" aria-label="Planet information sections"></nav>
    <div id="info-content" class="info-content"></div>
  </aside>

  <div class="dock">
    <div class="transport">
      <button id="play-btn" class="icon-btn" type="button" aria-label="Pause time">⏸</button>
      <input id="speed-slider" class="speed-slider" type="range" min="0" max="6" step="0.1" value="1"
        aria-label="Simulation speed" />
      <span class="speed-label" id="speed-label">1.0×</span>
      <button id="mute-btn" class="icon-btn" type="button" aria-label="Mute ambient sound">🔈</button>
    </div>
    <div id="rail" class="rail" role="navigation" aria-label="Solar system navigation"></div>
  </div>
</div>

<script type="module">
import * as THREE from 'https://cdnjs.cloudflare.com/ajax/libs/three.js/0.184.0/three.module.js';

/* =========================================================================
   UTILITIES
   ========================================================================= */
const clamp = (v,min,max)=>Math.max(min,Math.min(max,v));
const lerp = (a,b,t)=>a+(b-a)*t;
const rand = (min,max)=>min+Math.random()*(max-min);
const degToRad = d=>d*Math.PI/180;
const easeInOutCubic = t=> t<0.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2;

function makeCanvas(w,h){
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  return c;
}
function hexToRgbArr(hex){
  const v = hex.replace('#','');
  return [parseInt(v.substring(0,2),16), parseInt(v.substring(2,4),16), parseInt(v.substring(4,6),16)];
}
function lerpRgbArr(a,b,t){
  return [
    Math.round(a[0]+(b[0]-a[0])*t),
    Math.round(a[1]+(b[1]-a[1])*t),
    Math.round(a[2]+(b[2]-a[2])*t)
  ];
}
function rgba(arr,a=1){ return `rgba(${arr[0]},${arr[1]},${arr[2]},${a})`; }

const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

function tween(duration, onUpdate, onComplete, ease=easeInOutCubic){
  if(prefersReducedMotion){ onUpdate(1); if(onComplete) onComplete(); return; }
  const start = performance.now();
  function step(now){
    const t = clamp((now-start)/(duration*1000),0,1);
    onUpdate(ease(t));
    if(t<1) requestAnimationFrame(step); else if(onComplete) onComplete();
  }
  requestAnimationFrame(step);
}

/* =========================================================================
   PROCEDURAL TEXTURES
   ========================================================================= */
function softDotTexture(size=64){
  const c = makeCanvas(size,size);
  const ctx = c.getContext('2d');
  const g = ctx.createRadialGradient(size/2,size/2,0,size/2,size/2,size/2);
  g.addColorStop(0,'rgba(255,255,255,1)');
  g.addColorStop(0.4,'rgba(255,255,255,0.7)');
  g.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0,0,size,size);
  return new THREE.CanvasTexture(c);
}

function glowTexture(size=256, hex='#ffcf8c'){
  const c = makeCanvas(size,size);
  const ctx = c.getContext('2d');
  const arr = hexToRgbArr(hex);
  const g = ctx.createRadialGradient(size/2,size/2,0,size/2,size/2,size/2);
  g.addColorStop(0, rgba(arr,0.95));
  g.addColorStop(0.25, rgba(arr,0.55));
  g.addColorStop(0.6, rgba(arr,0.14));
  g.addColorStop(1, rgba(arr,0));
  ctx.fillStyle = g;
  ctx.fillRect(0,0,size,size);
  return new THREE.CanvasTexture(c);
}

function createPlanetTexture(opts){
  const w = opts.width || 768, h = opts.height || 384;
  const c = makeCanvas(w,h);
  const ctx = c.getContext('2d');
  const palette = opts.palette.map(hexToRgbArr);
  const bands = opts.bands || 24;

  for(let i=0;i<bands;i++){
    const t = i/(bands-1);
    const idx = t*(palette.length-1);
    const i0 = Math.floor(idx), i1 = Math.min(palette.length-1, i0+1);
    const localT = idx-i0;
    const col = lerpRgbArr(palette[i0], palette[i1], localT);
    ctx.fillStyle = `rgb(${col[0]},${col[1]},${col[2]})`;
    const y0 = Math.floor((i/bands)*h);
    const y1 = Math.floor(((i+1)/bands)*h);
    ctx.fillRect(0,y0,w,(y1-y0)+1);
  }

  const noiseAmount = opts.noise || 0;
  for(let i=0;i<noiseAmount;i++){
    const x = Math.random()*w, y = Math.random()*h;
    const r = rand(opts.noiseMin||4, opts.noiseMax||18);
    const tone = palette[Math.floor(Math.random()*palette.length)];
    const alpha = rand(0.06,0.18);
    ctx.fillStyle = `rgba(${tone[0]},${tone[1]},${tone[2]},${alpha})`;
    ctx.beginPath();
    ctx.ellipse(x,y,r,r*rand(0.3,0.8),Math.random()*Math.PI,0,Math.PI*2);
    ctx.fill();
  }

  const noise2Amount = opts.noise2 || 0;
  for(let i=0;i<noise2Amount;i++){
    const x = Math.random()*w, y = Math.random()*h;
    const r = rand(opts.noise2Min||0.8, opts.noise2Max||2.5);
    const tone = palette[Math.floor(Math.random()*palette.length)];
    const dark = Math.random()<0.5;
    const alpha = rand(0.05,0.13);
    ctx.fillStyle = dark ? `rgba(0,0,0,${alpha*0.6})` : `rgba(${tone[0]},${tone[1]},${tone[2]},${alpha})`;
    ctx.beginPath();
    ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fill();
  }

  if(opts.craters){
    for(let i=0;i<opts.craters;i++){
      const x = Math.random()*w, y = Math.random()*h, r = rand(2,9);
      ctx.beginPath();
      ctx.fillStyle = 'rgba(0,0,0,0.2)';
      ctx.arc(x,y,r,0,Math.PI*2);
      ctx.fill();
      ctx.beginPath();
      ctx.strokeStyle = 'rgba(255,255,255,0.10)';
      ctx.lineWidth = 1;
      ctx.arc(x-r*0.2,y-r*0.2,r*0.85,0,Math.PI*2);
      ctx.stroke();
    }
  }

  if(opts.spot){
    ctx.save();
    ctx.globalAlpha = 0.55;
    ctx.fillStyle = opts.spot.color;
    ctx.beginPath();
    ctx.ellipse(w*opts.spot.x, h*opts.spot.y, w*0.07, h*0.09, 0,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  if(opts.streaks){
    for(let i=0;i<opts.streaks;i++){
      const y = Math.random()*h;
      ctx.strokeStyle = `rgba(255,255,255,${rand(0.02,0.07)})`;
      ctx.lineWidth = rand(1,3);
      ctx.beginPath();
      ctx.moveTo(0,y);
      for(let x=0;x<=w;x+=16){
        ctx.lineTo(x, y+Math.sin(x*0.025+i)*3);
      }
      ctx.stroke();
    }
  }

  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.wrapS = THREE.RepeatWrapping;
  return tex;
}

function createCloudTexture(){
  const w=512,h=256;
  const c = makeCanvas(w,h);
  const ctx = c.getContext('2d');
  for(let i=0;i<150;i++){
    const x=Math.random()*w, y=Math.random()*h, r=rand(8,42);
    const g = ctx.createRadialGradient(x,y,0,x,y,r);
    const a = rand(0.15,0.5);
    g.addColorStop(0,`rgba(255,255,255,${a})`);
    g.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.ellipse(x,y,r,r*0.4,Math.random()*Math.PI,0,Math.PI*2);
    ctx.fill();
  }
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = THREE.RepeatWrapping;
  return tex;
}

function createRingTexture(innerHex, outerHex){
  const w=8,h=512;
  const c = makeCanvas(w,h);
  const ctx = c.getContext('2d');
  const innerArr = hexToRgbArr(innerHex), outerArr = hexToRgbArr(outerHex);
  for(let y=0;y<h;y++){
    const t = y/h;
    const col = lerpRgbArr(innerArr, outerArr, t);
    const bandPattern = Math.sin(t*60)*0.5+0.5;
    const microGap = (Math.sin(t*240) > 0.9) ? 0.12 : 1;
    const alpha = (0.22+bandPattern*0.55)*microGap;
    ctx.fillStyle = `rgba(${col[0]},${col[1]},${col[2]},${alpha})`;
    ctx.fillRect(0,y,w,1);
  }
  return new THREE.CanvasTexture(c);
}

function createBandScalarTexture(values, bands=44, w=512, h=256){
  const c = makeCanvas(w,h);
  const ctx = c.getContext('2d');
  for(let i=0;i<bands;i++){
    const t = i/(bands-1);
    const idx = t*(values.length-1);
    const i0 = Math.floor(idx), i1 = Math.min(values.length-1, i0+1);
    const localT = idx-i0;
    const v = Math.round(255*(values[i0]+(values[i1]-values[i0])*localT));
    ctx.fillStyle = `rgb(${v},${v},${v})`;
    const y0 = Math.floor((i/bands)*h), y1 = Math.floor(((i+1)/bands)*h);
    ctx.fillRect(0,y0,w,(y1-y0)+1);
  }
  return new THREE.CanvasTexture(c);
}

const softDot = softDotTexture();

/* =========================================================================
   ATMOSPHERE SHADER (rim glow)
   ========================================================================= */
const atmoVertex = `
  varying vec3 vNormal;
  varying vec3 vViewDir;
  void main(){
    vNormal = normalize(normalMatrix * normal);
    vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
    vViewDir = normalize(-mvPosition.xyz);
    gl_Position = projectionMatrix * mvPosition;
  }
`;
const atmoFragment = `
  uniform vec3 glowColor;
  uniform float intensity;
  varying vec3 vNormal;
  varying vec3 vViewDir;
  void main(){
    float rim = 1.0 - max(dot(vNormal, vViewDir), 0.0);
    rim = pow(rim, 2.6);
    gl_FragColor = vec4(glowColor, rim*intensity);
  }
`;
function createAtmosphere(radius, colorHex, intensity){
  const geo = new THREE.SphereGeometry(radius, 48, 48);
  const mat = new THREE.ShaderMaterial({
    uniforms:{
      glowColor:{ value: new THREE.Color(colorHex) },
      intensity:{ value: intensity }
    },
    vertexShader: atmoVertex,
    fragmentShader: atmoFragment,
    transparent: true,
    side: THREE.BackSide,
    blending: THREE.AdditiveBlending,
    depthWrite: false
  });
  return new THREE.Mesh(geo, mat);
}

/* =========================================================================
   RENDERER / SCENE / CAMERA / LIGHTS
   ========================================================================= */

function createStarLayer(count, radius, size, opacity, warmFraction=0.12){
  const positions = new Float32Array(count*3);
  const colors = new Float32Array(count*3);
  for(let i=0;i<count;i++){
    const r = radius*(0.55+Math.random()*0.45);
    const theta = Math.random()*Math.PI*2;
    const phi = Math.acos(2*Math.random()-1);
    positions[i*3]   = r*Math.sin(phi)*Math.cos(theta);
    positions[i*3+1] = r*Math.sin(phi)*Math.sin(theta);
    positions[i*3+2] = r*Math.cos(phi);
    const warm = Math.random() < warmFraction;
    const tint = rand(0.78,1);
    colors[i*3]   = warm ? 1    : tint;
    colors[i*3+1] = warm ? 0.84 : tint;
    colors[i*3+2] = warm ? 0.68 : 1;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions,3));
  geo.setAttribute('color', new THREE.BufferAttribute(colors,3));
  const mat = new THREE.PointsMaterial({
    size, map:softDot, vertexColors:true, transparent:true, depthWrite:false,
    sizeAttenuation:true, opacity:0
  });
  const pts = new THREE.Points(geo, mat);
  pts.userData.targetOpacity = opacity;
  scene.add(pts);
  return pts;
}

/* ---- Milky Way galaxy band (soft diagonal glow sweeping the sky) ---- */
function createMilkyWayTexture(w=1280,h=640){
  const c = makeCanvas(w,h);
  const ctx = c.getContext('2d');
  ctx.clearRect(0,0,w,h);
  const angle = degToRad(-18);
  const cosA = Math.cos(angle), sinA = Math.sin(angle);
  const cx = w/2, cy = h/2;

  ctx.save();
  ctx.translate(cx,cy);
  ctx.rotate(angle);
  const bandH = h*0.62;
  const grad = ctx.createLinearGradient(0,-bandH/2,0,bandH/2);
  grad.addColorStop(0,   'rgba(70,80,150,0)');
  grad.addColorStop(0.16,'rgba(140,120,195,0.10)');
  grad.addColorStop(0.46,'rgba(255,200,150,0.22)');
  grad.addColorStop(0.52,'rgba(255,225,195,0.26)');
  grad.addColorStop(0.84,'rgba(110,150,210,0.10)');
  grad.addColorStop(1,   'rgba(70,80,150,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(-w, -bandH/2, w*2, bandH);
  ctx.restore();

  for(let i=0;i<4200;i++){
    const x = Math.random()*w, y = Math.random()*h;
    const dx = x-cx, dy = y-cy;
    const distToLine = Math.abs(-dx*sinA + dy*cosA);
    const falloff = Math.exp(-(distToLine*distToLine)/(2*78*78));
    if(Math.random() > falloff*0.92+0.035) continue;
    const r = rand(0.4,1.7);
    const warm = Math.random() < 0.4;
    const alpha = rand(0.25,0.85)*falloff + 0.05;
    ctx.fillStyle = warm ? `rgba(255,222,188,${alpha})` : `rgba(205,222,255,${alpha})`;
    ctx.beginPath();
    ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fill();
  }

  for(let i=0;i<70;i++){
    const x = Math.random()*w, y = cy+rand(-h*0.2,h*0.2);
    const r = rand(45,150);
    const g = ctx.createRadialGradient(x,y,0,x,y,r);
    const warm = Math.random()<0.5;
    const tone = warm ? '150,95,60' : '95,80,150';
    g.addColorStop(0, `rgba(${tone},0.10)`);
    g.addColorStop(1, `rgba(${tone},0)`);
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.ellipse(x,y,r,r*0.4,angle,0,Math.PI*2);
    ctx.fill();
  }

  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}
function createMilkyWaySky(){
  const tex = createMilkyWayTexture();
  const geo = new THREE.SphereGeometry(4650, 32, 18);
  const mat = new THREE.MeshBasicMaterial({
    map:tex, side:THREE.BackSide, transparent:true, opacity:0,
    blending:THREE.AdditiveBlending, depthWrite:false
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.rotation.z = rand(0, Math.PI*2);
  mesh.rotation.x = rand(-0.2,0.2);
  mesh.userData.targetOpacity = 0.85;
  scene.add(mesh);
  return mesh;
}
const milkyWay = createMilkyWaySky();

function createNebula(){
  const group = new THREE.Group();
  const defs = [
    { color:'#ff7a3d', op:0.16 },
    { color:'#5b3df0', op:0.15 },
    { color:'#2bb3a3', op:0.11 },
    { color:'#a13d8f', op:0.13 },
    { color:'#ff5a2e', op:0.12 },
    { color:'#3d6fd9', op:0.10 }
  ];
  defs.forEach(d=>{
    const tex = glowTexture(256, d.color);
    const mat = new THREE.SpriteMaterial({
      map:tex, transparent:true, opacity:0, blending:THREE.AdditiveBlending, depthWrite:false
    });
    const sprite = new THREE.Sprite(mat);
    const s = rand(1000,1900);
    sprite.scale.set(s,s,1);
    sprite.position.set(rand(-2000,2000), rand(-700,700), rand(-2000,2000));
    sprite.userData.targetOpacity = d.op;
    group.add(sprite);
  });
  scene.add(group);
  return group;

}

function createSunCorona(r){
  const group = new THREE.Group();
  const layers = [
    { s:r*3.0,  op:1.0,  color:'#fff0c8' },
    { s:r*5.0,  op:0.7,  color:'#ffb454' },
    { s:r*8.2,  op:0.42, color:'#ff7a30' },
    { s:r*13.5, op:0.22, color:'#ff4e1c' }
  ];
  layers.forEach(d=>{
    const tex = glowTexture(256, d.color);
    const mat = new THREE.SpriteMaterial({
      map:tex, color:0xffffff, transparent:true, opacity:0,
      blending:THREE.AdditiveBlending, depthWrite:false
    });
    const sprite = new THREE.Sprite(mat);
    sprite.scale.set(d.s,d.s,1);
    sprite.userData.targetOpacity = d.op;
    sprite.userData.baseScale = d.s;
    group.add(sprite);
  });
  return group;
}
const corona = createSunCorona(SUN_RADIUS);
sun.add(corona);

function createSolarFlares(r){
  const count = 220;
  const positions = new Float32Array(count*3);
  for(let i=0;i<count;i++){
    const theta = Math.random()*Math.PI*2;
    const phi = Math.acos(2*Math.random()-1);
    const rr = r*rand(1.0,1.2);
    positions[i*3]   = rr*Math.sin(phi)*Math.cos(theta);
    positions[i*3+1] = rr*Math.sin(phi)*Math.sin(theta);
    positions[i*3+2] = rr*Math.cos(phi);
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions,3));
  const mat = new THREE.PointsMaterial({
    size:r*0.12, map:softDot, color:0xffaa5c, transparent:true,
    blending:THREE.AdditiveBlending, depthWrite:false, sizeAttenuation:true, opacity:0
  });
  const pts = new THREE.Points(geo, mat);
  pts.userData.targetOpacity = 0.9;
  return pts;
}
const flares = createSolarFlares(SUN_RADIUS);
sun.add(flares);

function statGrid(pairs){
  return '<div class="stat-grid">' + pairs.map(([k,v])=>
    `<div class="stat"><span class="stat-k">${k}</span><span class="stat-v">${v}</span></div>`
  ).join('') + '</div>';
}
function p(text){ return `<p class="info-p">${text}</p>`; }
function factList(items){ return '<ul class="fact-list">' + items.map(i=>`<li>${i}</li>`).join('') + '</ul>'; }

const planets = [];

function buildPlanet(cfg){
  const pivot = new THREE.Object3D();
  pivot.rotation.y = rand(0, Math.PI*2);
  scene.add(pivot);

  const orbitArm = new THREE.Object3D();
  orbitArm.position.x = cfg.orbitRadius;
  pivot.add(orbitArm);

  const tiltPivot = new THREE.Object3D();
  tiltPivot.rotation.z = degToRad(cfg.axialTilt);
  orbitArm.add(tiltPivot);

  const tex = createPlanetTexture(cfg.textureOpts);
  const mat = new THREE.MeshStandardMaterial({ map:tex, roughness:0.92, metalness:0.05 });
  if(cfg.oceanRoughness){
    mat.roughnessMap = createBandScalarTexture(cfg.oceanRoughness, cfg.textureOpts.bands, 512, 256);
    mat.roughness = 1.0;
    mat.metalness = 0.06;
  }
  const mesh = new THREE.Mesh(new THREE.SphereGeometry(cfg.radius,64,64), mat);
  tiltPivot.add(mesh);

  let clouds=null, atmosphere=null, ring=null, moonPivot=null, moonMesh=null, auroraA=null, auroraB=null, glowHalo=null;

  if(cfg.clouds){
    const cloudTex = createCloudTexture();
    const cloudMat = new THREE.MeshStandardMaterial({ map:cloudTex, transparent:true, depthWrite:false, roughness:1 });
    clouds = new THREE.Mesh(new THREE.SphereGeometry(cfg.radius*1.015,64,64), cloudMat);
    tiltPivot.add(clouds);
  }

  if(cfg.atmosphere){
    atmosphere = createAtmosphere(cfg.radius*1.13, cfg.atmosphere.color, cfg.atmosphere.intensity);
    tiltPivot.add(atmosphere);

    const haloTex = glowTexture(128, cfg.atmosphere.color);
    const haloMat = new THREE.SpriteMaterial({
      map:haloTex, transparent:true, opacity:0.22, blending:THREE.AdditiveBlending, depthWrite:false
    });
    glowHalo = new THREE.Sprite(haloMat);
    glowHalo.scale.set(cfg.radius*4.6, cfg.radius*4.6, 1);
    tiltPivot.add(glowHalo);
  }

  if(cfg.ring){
    const ringTex = createRingTexture(cfg.ring.innerColor, cfg.ring.outerColor);
    const ringGeo = new THREE.RingGeometry(cfg.radius*cfg.ring.inner, cfg.radius*cfg.ring.outer, 128);
    const ringMat = new THREE.MeshBasicMaterial({ map:ringTex, side:THREE.DoubleSide, transparent:true, depthWrite:false });
    ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = Math.PI/2;
    tiltPivot.add(ring);
  }

  if(cfg.moon){
    moonPivot = new THREE.Object3D();
    moonPivot.rotation.y = rand(0,Math.PI*2);
    orbitArm.add(moonPivot);
    const moonTex = createPlanetTexture(cfg.moon.textureOpts);
    const moonMat = new THREE.MeshStandardMaterial({ map:moonTex, roughness:0.95 });
    moonMesh = new THREE.Mesh(new THREE.SphereGeometry(cfg.moon.radius,32,32), moonMat);
    moonMesh.position.x = cfg.moon.orbitRadius;
    moonPivot.add(moonMesh);
  }

  if(cfg.auroras){
    const auroraTex = glowTexture(128,'#8effc2');
    [1,-1].forEach(sign=>{
      const mat = new THREE.SpriteMaterial({ map:auroraTex, transparent:true, opacity:0.45, blending:THREE.AdditiveBlending, depthWrite:false });
      const sprite = new THREE.Sprite(mat);
      sprite.scale.set(cfg.radius*1.7, cfg.radius*1.0, 1);
      sprite.position.set(0, cfg.radius*0.95*sign, 0);
      tiltPivot.add(sprite);
      if(sign===1) auroraA = sprite; else auroraB = sprite;
    });
  }

  const entry = { cfg, pivot, orbitArm, tiltPivot, mesh, clouds, atmosphere, ring, moonPivot, moonMesh, auroraA, auroraB, glowHalo, railNode:null };
  planets.push(entry);
  return entry;
}

function createBeltPoints(count, rInner, rOuter, vertSpread, colorHex, size, opacity){
  const positions = new Float32Array(count*3);
  for(let i=0;i<count;i++){
    const r = rand(rInner,rOuter);
    const theta = Math.random()*Math.PI*2;
    positions[i*3]   = r*Math.cos(theta);
    positions[i*3+1] = rand(-vertSpread,vertSpread);
    positions[i*3+2] = r*Math.sin(theta);
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions,3));
  const mat = new THREE.PointsMaterial({
    size, map:softDot, color:colorHex, transparent:true, opacity, depthWrite:false, sizeAttenuation:true
  });
  const pts = new THREE.Points(geo, mat);
  scene.add(pts);
  return pts;
}

   ========================================================================= */
function createComet(){
  const headTex = glowTexture(128,'#cfe9ff');
  const headMat = new THREE.SpriteMaterial({ map:headTex, transparent:true, blending:THREE.AdditiveBlending, depthWrite:false, opacity:0.95 });
  const head = new THREE.Sprite(headMat);
  head.scale.set(5,5,1);
  scene.add(head);

  const trailCount = 46;
  const trailPositions = new Float32Array(trailCount*3);
  const trailGeo = new THREE.BufferGeometry();
  trailGeo.setAttribute('position', new THREE.BufferAttribute(trailPositions,3));
  const trailMat = new THREE.PointsMaterial({
    size:2.4, map:softDot, color:0xbfe3ff, transparent:true, opacity:0.55,
    blending:THREE.AdditiveBlending, depthWrite:false, sizeAttenuation:true
  });
  const trail = new THREE.Points(trailGeo, trailMat);
  scene.add(trail);

  return { head, trail, trailPositions, history:[], t:rand(0,40), period:50, activeFrac:0.38 };
}
const comet = createComet();

function updateComet(dt){
  comet.t += dt;
  const cycle = comet.t % comet.period;
  const visible = cycle < comet.period*comet.activeFrac;
  comet.head.visible = visible;
  comet.trail.visible = visible;
  if(!visible){ comet.history.length = 0; return; }
  const prog = cycle/(comet.period*comet.activeFrac);
  const ang = -Math.PI*0.7 + prog*Math.PI*1.4;
  const a=380, b=160;
  const x = Math.cos(ang)*a;
  const z = Math.sin(ang)*b - 60;
  const y = Math.sin(prog*Math.PI)*50;
  comet.head.position.set(x,y,z);
  comet.history.unshift([x,y,z]);
  const tc = comet.trailPositions.length/3;
  if(comet.history.length > tc) comet.history.pop();
  for(let i=0;i<tc;i++){
    const h = comet.history[i] || comet.history[comet.history.length-1] || [x,y,z];
    comet.trailPositions[i*3]=h[0];
    comet.trailPositions[i*3+1]=h[1];
    comet.trailPositions[i*3+2]=h[2];
  }
  comet.trail.geometry.attributes.position.needsUpdate = true;
}

/* =========================================================================
   POINTER / TOUCH CAMERA CONTROLS
   ========================================================================= */
const pointers = new Map();
let dragMoved = 0;
let lastPinchDist = null;
let lastPanMid = null;

canvas.addEventListener('pointerdown', e=>{
  if(!state.booted) return;
  canvas.setPointerCapture(e.pointerId);
  pointers.set(e.pointerId, { x:e.clientX, y:e.clientY });
  dragMoved = 0;
  hideHint();
});

window.addEventListener('pointermove', e=>{
  if(!state.booted || !pointers.has(e.pointerId)) return;
  const prev = pointers.get(e.pointerId);
  const dx = e.clientX-prev.x, dy = e.clientY-prev.y;
  pointers.set(e.pointerId, { x:e.clientX, y:e.clientY });
  dragMoved += Math.abs(dx)+Math.abs(dy);

  if(pointers.size === 1){
    cam.thetaVel -= dx*0.0028;
    cam.phiVel -= dy*0.0028;
  } else if(pointers.size >= 2){
    const pts = Array.from(pointers.values());
    const dist = Math.hypot(pts[0].x-pts[1].x, pts[0].y-pts[1].y);
    const mid = { x:(pts[0].x+pts[1].x)/2, y:(pts[0].y+pts[1].y)/2 };
    if(lastPinchDist != null){
      cam.radiusVel -= (dist-lastPinchDist)*0.5;
    }
    if(lastPanMid != null){
      panCamera(mid.x-lastPanMid.x, mid.y-lastPanMid.y);
    }
    lastPinchDist = dist;
    lastPanMid = mid;
  }
});

function endPointer(e){
  pointers.delete(e.pointerId);
  if(pointers.size < 2){ lastPinchDist = null; lastPanMid = null; }
  if(pointers.size === 0 && state.booted){
    if(dragMoved < 6) handleClick(e);
  }
}
window.addEventListener('pointerup', endPointer);
window.addEventListener('pointercancel', endPointer);

canvas.addEventListener('wheel', e=>{
  if(!state.booted) return;
  e.preventDefault();
  cam.radiusVel += e.deltaY*0.05;
  hideHint();
}, { passive:false });

function panCamera(dx,dy){
  const panScale = cam.radius*0.0016;
  const xCol = new THREE.Vector3().setFromMatrixColumn(camera.matrixWorld,0);
  const yCol = new THREE.Vector3().setFromMatrixColumn(camera.matrixWorld,1);
  cam.panOffset.addScaledVector(xCol, -dx*panScale);
  cam.panOffset.addScaledVector(yCol, dy*panScale);
}

const raycaster = new THREE.Raycaster();
const ndc = new THREE.Vector2();
function handleClick(e){
  ndc.x = (e.clientX/window.innerWidth)*2-1;
  ndc.y = -(e.clientY/window.innerHeight)*2+1;
  raycaster.setFromCamera(ndc, camera);
  const meshes = focusables.map(f=>f.mesh);
  const hits = raycaster.intersectObjects(meshes, false);
  if(hits.length>0){
    const entry = focusables.find(f=>f.mesh===hits[0].object);
    if(entry) focusEntry(entry);
  }
}

/* =========================================================================
   FOCUS / CINEMATIC FLIGHT
   ========================================================================= */
function focusEntry(entry){
  flight.startTargetPos.copy(cam.target);
  flight.startTheta = cam.theta; flight.startPhi = cam.phi; flight.startRadius = cam.radius;
  flight.endTheta = cam.theta - 0.5;
  flight.endPhi = clamp(Math.PI*0.42, 0.3, Math.PI*0.6);
  flight.endRadius = entry.cfg.radius * (entry.cfg.ring ? 6.2 : 4.4);
  flight.toOverview = false;
  flight.t = 0; flight.duration = 2.1;
  cam.panOffset.set(0,0,0);
  state.focused = entry;
  state.focusing = true;
  renderInfoPanel(entry);
  updateRailActive(entry);
}

function returnToOverview(){
  flight.startTargetPos.copy(cam.target);
  flight.startTheta = cam.theta; flight.startPhi = cam.phi; flight.startRadius = cam.radius;
  flight.endTheta = cam.theta;
  flight.endPhi = 0.95;
  flight.endRadius = 260;
  flight.toOverview = true;
  flight.t = 0; flight.duration = 1.6;
  cam.panOffset.set(0,0,0);
  state.focused = null;
  state.focusing = true;
  hideInfoPanel();
  updateRailActive(null);
}

/* =========================================================================
   CAMERA UPDATE
   ========================================================================= */
function updateCamera(delta){
  if(!state.focusing){
    cam.theta += cam.thetaVel;
    cam.phi += cam.phiVel;
    cam.radius += cam.radiusVel;
    if(pointers.size===0 && !state.focused && !prefersReducedMotion){
      cam.thetaVel += delta*0.0035;
    }
  }
  cam.thetaVel *= 0.9;
  cam.phiVel *= 0.9;
  cam.radiusVel *= 0.85;
  cam.phi = clamp(cam.phi, 0.16, Math.PI-0.16);
  cam.radius = clamp(cam.radius, getMinRadius(), cam.maxRadius);

  let basePoint;
  if(state.focusing){
    flight.t += delta/flight.duration;
    const t = clamp(flight.t,0,1);
    const e = easeInOutCubic(t);
    cam.theta = lerp(flight.startTheta, flight.endTheta, e);
    cam.phi = lerp(flight.startPhi, flight.endPhi, e);
    cam.radius = lerp(flight.startRadius, flight.endRadius, e);
    const endPoint = flight.toOverview ? new THREE.Vector3(0,0,0) : getLivePos(state.focused);
    basePoint = flight.startTargetPos.clone().lerp(endPoint, e);
    if(t>=1) state.focusing = false;
  } else if(state.focused){
    basePoint = getLivePos(state.focused);
    cam.panOffset.lerp(new THREE.Vector3(0,0,0), 0.02);
  } else {
    basePoint = new THREE.Vector3(0,0,0);
  }
  cam.target.copy(basePoint).add(cam.panOffset);

  const sinPhi = Math.sin(cam.phi);
  camera.position.set(
    cam.target.x + cam.radius*sinPhi*Math.cos(cam.theta),
    cam.target.y + cam.radius*Math.cos(cam.phi),
    cam.target.z + cam.radius*sinPhi*Math.sin(cam.theta)
  );
  camera.lookAt(cam.target);
}

const railEl = document.getElementById('rail');
function buildRail(){
  railEl.innerHTML = '';

  const sunNode = document.createElement('button');
  sunNode.type = 'button';
  sunNode.className = 'rail-node sun-node';
  sunNode.style.left = '4%';
  sunNode.innerHTML = '<span class="dot"></span><span class="label">Sun</span>';
  sunNode.addEventListener('click', ()=>focusEntry(sunEntry));
  railEl.appendChild(sunNode);
  sunEntry.railNode = sunNode;

  const positions = planets.map(pl=>Math.sqrt(pl.cfg.orbitRadius));
  const min = Math.min(...positions), max = Math.max(...positions);
  planets.forEach((pl,i)=>{
    const t = (positions[i]-min)/(max-min);
    const leftPct = 12 + t*84;
    const node = document.createElement('button');
    node.type = 'button';
    node.className = 'rail-node';
    node.style.left = leftPct+'%';
    node.innerHTML = `<span class="dot" style="background:${pl.cfg.accent};color:${pl.cfg.accent}"></span><span class="label">${pl.cfg.name}</span>`;
    node.addEventListener('click', ()=>focusEntry(pl));
    railEl.appendChild(node);
    pl.railNode = node;
  });
}
function updateRailActive(entry){
  focusables.forEach(f=>{ if(f.railNode) f.railNode.classList.remove('active'); });
  if(entry && entry.railNode) entry.railNode.classList.add('active');
}

const infoEyebrowEl = document.getElementById('info-eyebrow');
const infoTitleEl = document.getElementById('info-title');
const infoTaglineEl = document.getElementById('info-tagline');
const infoHeroEl = document.getElementById('info-hero');
const infoTabsEl = document.getElementById('info-tabs');
const infoContentEl = document.getElementById('info-content');

function shadeHex(hex, amt){
  const arr = hexToRgbArr(hex);
  const f = amt>=0 ? [255,255,255] : [0,0,0];
  const t = Math.abs(amt);
  const out = lerpRgbArr(arr, f, t);
  return `rgb(${out[0]},${out[1]},${out[2]})`;
}
function accentRgba(hex,a){ return rgba(hexToRgbArr(hex), a); }
let currentEntry = null;

function renderInfoPanel(entry){
  currentEntry = entry;
  const cfg = entry.cfg;
  infoEyebrowEl.textContent = cfg.distanceAU>0 ? cfg.distanceAU.toFixed(2)+' AU from the Sun' : 'At the centre of it all';
  infoTitleEl.textContent = cfg.name;
  infoTaglineEl.textContent = cfg.tagline;

  infoSwatchEl.style.setProperty('--swatch-light', shadeHex(cfg.accent, 0.55));
  infoSwatchEl.style.setProperty('--swatch-mid', cfg.accent);
  infoSwatchEl.style.setProperty('--swatch-dark', shadeHex(cfg.accent, -0.55));
  infoSwatchEl.style.setProperty('--swatch-glow', accentRgba(cfg.accent, 0.55));
  infoPanelEl.style.setProperty('--panel-glow', accentRgba(cfg.accent, 0.16));
  infoPanelEl.style.setProperty('--panel-accent', accentRgba(cfg.accent, 0.7));

  infoHeroEl.innerHTML = (cfg.hero||[]).map(([k,v])=>
    `<div class="hero-item"><span class="hero-val">${v}</span><span class="hero-key">${k}</span></div>`
  ).join('');

  infoTabsEl.innerHTML = '';
  cfg.sections.forEach((s,i)=>{
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'info-tab'+(i===0?' active':'');
    btn.dataset.id = s.id;
    btn.textContent = s.label;
    btn.addEventListener('click', ()=>setActiveTab(s.id));
    infoTabsEl.appendChild(btn);
  });
  setActiveTab(cfg.sections[0].id);
  infoPanelEl.classList.add('open');
}
function setActiveTab(id){
  if(!currentEntry) return;
  Array.from(infoTabsEl.children).forEach(btn=>btn.classList.toggle('active', btn.dataset.id===id));
  const section = currentEntry.cfg.sections.find(s=>s.id===id);
  infoContentEl.classList.remove('fade-in');
  infoContentEl.innerHTML = section.render();
  void infoContentEl.offsetWidth;
  infoContentEl.classList.add('fade-in');
}
function hideInfoPanel(){ infoPanelEl.classList.remove('open'); currentEntry = null; }
document.getElementById('info-close').addEventListener('click', returnToOverview);

/* =========================================================================
   HUD: TRANSPORT (play/pause, speed, mute)
   ========================================================================= */
const playBtn = document.getElementById('play-btn');
const speedSlider = document.getElementById('speed-slider');
const speedLabel = document.getElementById('speed-label');
const muteBtn = document.getElementById('mute-btn');

playBtn.addEventListener('click', ()=>{
  state.playing = !state.playing;
  playBtn.textContent = state.playing ? '⏸' : '▶';
  playBtn.setAttribute('aria-label', state.playing ? 'Pause time' : 'Resume time');
});
speedSlider.addEventListener('input', e=>{
  state.timeScale = parseFloat(e.target.value);
  speedLabel.textContent = state.timeScale.toFixed(1)+'×';
});

/* =========================================================================
   AMBIENT AUDIO (fully synthesized — no external files)
   ========================================================================= */
let audioCtx=null, masterGain=null, audioStarted=false;
function startAmbientAudio(){
  if(audioStarted) return;
  audioStarted = true;
  try{
    audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.0001;
    masterGain.connect(audioCtx.destination);

    [55, 82.5, 41.2].forEach((freq,i)=>{
      const osc = audioCtx.createOscillator();
      osc.type = i===2 ? 'sine' : 'triangle';
      osc.frequency.value = freq;
      const gain = audioCtx.createGain();
      gain.gain.value = i===0 ? 0.5 : 0.25;
      const filter = audioCtx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.value = 420;
      osc.connect(filter); filter.connect(gain); gain.connect(masterGain);
      osc.start();

      const lfo = audioCtx.createOscillator();
      lfo.frequency.value = 0.03+i*0.012;
      const lfoGain = audioCtx.createGain();
      lfoGain.gain.value = freq*0.012;
      lfo.connect(lfoGain); lfoGain.connect(osc.frequency);
      lfo.start();
    });

    const bufferSize = 2*audioCtx.sampleRate;
    const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = noiseBuffer.getChannelData(0);
    let lastOut = 0;
    for(let i=0;i<bufferSize;i++){
      const white = Math.random()*2-1;
      lastOut = (lastOut+0.02*white)/1.02;
      data[i] = lastOut*4.5;
    }
    const noiseSrc = audioCtx.createBufferSource();
    noiseSrc.buffer = noiseBuffer;
    noiseSrc.loop = true;
    const noiseFilter = audioCtx.createBiquadFilter();
    noiseFilter.type = 'bandpass';
    noiseFilter.frequency.value = 300;
    noiseFilter.Q.value = 0.6;
    const noiseGain = audioCtx.createGain();
    noiseGain.gain.value = 0.16;
    noiseSrc.connect(noiseFilter); noiseFilter.connect(noiseGain); noiseGain.connect(masterGain);
    noiseSrc.start();

    masterGain.gain.linearRampToValueAtTime(0.22, audioCtx.currentTime+3);
  }catch(err){ /* Web Audio unavailable — fail silently */ }
}
muteBtn.addEventListener('click', ()=>{
  state.muted = !state.muted;
  muteBtn.textContent = state.muted ? '🔇' : '🔈';
  muteBtn.setAttribute('aria-label', state.muted ? 'Unmute ambient sound' : 'Mute ambient sound');
  if(audioCtx && masterGain){
    const target = state.muted ? 0.0001 : 0.22;
    masterGain.gain.cancelScheduledValues(audioCtx.currentTime);
    masterGain.gain.linearRampToValueAtTime(target, audioCtx.currentTime+0.6);
  }
});

/* =========================================================================
   HINT
   ========================================================================= */
const hintEl = document.getElementById('hint');
let hintTimeout = null;
function showHintTemporarily(){
  hintEl.classList.add('show');
  clearTimeout(hintTimeout);
  hintTimeout = setTimeout(()=>hintEl.classList.remove('show'), 6500);
}
function hideHint(){ hintEl.classList.remove('show'); clearTimeout(hintTimeout); }

/* =========================================================================
   BOOT SEQUENCE
   ========================================================================= */
const bootEl = document.getElementById('boot');
const hudEl = document.getElementById('hud');
const enterBtn = document.getElementById('enter-btn');

function kickoffVisualReveal(){
  const fadeables = [starsFar, starsNear, starsHero, milkyWay, ...nebula.children, sun, ...corona.children, flares];
  if(prefersReducedMotion){
    fadeables.forEach(obj=>{ obj.material.opacity = obj.userData.targetOpacity ?? 1; });
    return;
  }
  setTimeout(()=>{
    tween(3.2, t=>{
      starsFar.material.opacity = t*starsFar.userData.targetOpacity;
      starsNear.material.opacity = t*starsNear.userData.targetOpacity;
      starsHero.material.opacity = t*starsHero.userData.targetOpacity;
    });
  }, 300);
  setTimeout(()=>{
    tween(4.0, t=>{ milkyWay.material.opacity = t*milkyWay.userData.targetOpacity; });
    nebula.children.forEach(s=> tween(3.6, t=>{ s.material.opacity = t*s.userData.targetOpacity; }));
  }, 900);
  setTimeout(()=>{
    tween(2.4, t=>{ sun.material.opacity = t*sun.userData.targetOpacity; });
    corona.children.forEach(s=> tween(2.6, t=>{ s.material.opacity = t*s.userData.targetOpacity; }));
    tween(2.6, t=>{ flares.material.opacity = t*flares.userData.targetOpacity; });
  }, 1500);
}
kickoffVisualReveal();

enterBtn.addEventListener('click', ()=>{
  startAmbientAudio();
  bootEl.classList.add('boot-hidden');
  hudEl.setAttribute('aria-hidden','false');
  state.booted = true;
  setTimeout(()=>{ bootEl.style.display='none'; }, 950);
  setTimeout(()=>{ hudEl.classList.add('visible'); showHintTemporarily(); }, 250);
});

/* =========================================================================
   KEYBOARD & RESIZE
   ========================================================================= */
window.addEventListener('keydown', e=>{
  if(!state.booted) return;
  if(e.key === 'Escape'){ if(state.focused) returnToOverview(); }
  else if(e.key === ' '){ e.preventDefault(); playBtn.click(); }
  else if(e.key === 'm' || e.key === 'M'){ muteBtn.click(); }
  else if(e.key === 'ArrowRight' || e.key === ']'){ cycleFocus(1); }
  else if(e.key === 'ArrowLeft' || e.key === '['){ cycleFocus(-1); }
});
function cycleFocus(dir){
  const idx = state.focused ? focusables.indexOf(state.focused) : -1;
  let next = idx+dir;
  if(next<0) next = focusables.length-1;
  if(next>=focusables.length) next = 0;
  focusEntry(focusables[next]);
}
window.addEventListener('resize', ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

/* =========================================================================
   MAIN LOOP
   ========================================================================= */
const clock = new THREE.Clock();
function update(delta){
  const dt = delta*state.timeScale*(state.playing?1:0);

  sun.rotation.y += delta*0.02;
  sunTex.offset.x += delta*0.01;
  flares.rotation.y += dt*0.4;

  const elapsed = clock.elapsedTime;

  corona.children.forEach((sprite,i)=>{
    const base = sprite.userData.baseScale;
    const s = base*(1+0.05*Math.sin(elapsed*0.5+i*1.3));
    sprite.scale.set(s,s,1);
  });

  if(state.booted){
    starsNear.material.opacity = starsNear.userData.targetOpacity*(0.86+Math.sin(elapsed*1.6)*0.14);
    starsHero.material.opacity = starsHero.userData.targetOpacity*(0.78+Math.sin(elapsed*2.1+1.4)*0.22);
  }

  planets.forEach(pl=>{
    pl.pivot.rotation.y += dt*pl.cfg.orbitSpeed;
    pl.mesh.rotation.y += dt*pl.cfg.spinSpeed;
    if(pl.clouds) pl.clouds.rotation.y += dt*pl.cfg.spinSpeed*1.4;
    if(pl.cfg.animatedBands) pl.mesh.material.map.offset.x += dt*0.012;
    if(pl.ring) pl.ring.rotation.z += dt*0.015;
    if(pl.moonPivot) pl.moonPivot.rotation.y += dt*pl.cfg.moon.orbitSpeed;
    if(pl.glowHalo){
      pl.glowHalo.material.opacity = 0.16+Math.sin(elapsed*0.7+pl.cfg.orbitRadius)*0.05;
    }
    if(pl.auroraA){
      const pulse = 0.35+Math.sin(elapsed*1.3)*0.15;
      pl.auroraA.material.opacity = pulse;
      pl.auroraB.material.opacity = pulse*0.8;
    }
  });

  asteroidBelt.rotation.y += dt*0.01;
  kuiperBelt.rotation.y += dt*0.006;
  updateComet(dt);

  scene.updateMatrixWorld(true);
  updateCamera(delta);
}

function animate(){
  requestAnimationFrame(animate);
  const delta = Math.min(clock.getDelta(), 0.05);
  update(delta);
  renderer.render(scene, camera);
}
animate();
</script>
